  scheduler_params:
    interval: 'step'
  reducelr:
    mode: 'min'
    factor: 0.999
    patience: 10000000
    monitor: 'epoch_valid_loss'
    verbose: True
  linearhalfcosine:
    warmup_steps: 1000
    total_steps: 260000

  modelcheckpoint:
